<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EuroWatch — EU Cyber Incident Monitor</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f4f8; color: #1a1a2e; }
    header { background: #0d2b4e; color: white; padding: 16px 32px; display: flex; align-items: center; gap: 12px; }
    header h1 { font-size: 22px; font-weight: 700; }
    header span { font-size: 13px; color: #90caf9; }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px 16px; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: white; border-radius: 8px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .stat-card .label { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-card .value { font-size: 32px; font-weight: 700; color: #0d2b4e; margin-top: 4px; }
    .filters { background: white; border-radius: 8px; padding: 16px; margin-bottom: 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    .filters label { font-size: 13px; font-weight: 600; color: #444; }
    .filters select, .filters input { border: 1px solid #ddd; border-radius: 6px; padding: 6px 10px; font-size: 13px; color: #333; background: #fafafa; }
    .filters button { background: #1565c0; color: white; border: none; border-radius: 6px; padding: 7px 16px; font-size: 13px; cursor: pointer; }
    .filters button:hover { background: #0d47a1; }
    .filters button.reset { background: #eee; color: #444; }
    .filters button.reset:hover { background: #ddd; }
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    thead { background: #0d2b4e; color: white; }
    th { padding: 12px 14px; text-align: left; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
    td { padding: 11px 14px; font-size: 13px; border-bottom: 1px solid #f0f0f0; vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f8fbff; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
    .badge.critical { background: #ffebee; color: #b71c1c; }
    .badge.high { background: #fff3e0; color: #e65100; }
    .badge.medium { background: #fffde7; color: #f57f17; }
    .badge.low { background: #e8f5e9; color: #1b5e20; }
    .badge.unknown { background: #f3f3f3; color: #777; }
    .badge.sector { background: #e3f0fc; color: #0d47a1; }
    .countries { display: flex; flex-wrap: wrap; gap: 3px; }
    .country { background: #e8eaf6; color: #283593; padding: 1px 6px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .title-link { color: #1565c0; text-decoration: none; font-weight: 500; }
    .title-link:hover { text-decoration: underline; }
    .loading { text-align: center; padding: 60px; color: #888; }
    .error { background: #ffebee; color: #b71c1c; padding: 16px; border-radius: 8px; margin-bottom: 16px; }
    .total-bar { font-size: 13px; color: #555; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const API = "http://127.0.0.1:8000";

    function Badge({ value, type = "severity" }) {
      if (!value) return <span className="badge unknown">unknown</span>;
      return <span className={`badge ${type === "severity" ? value : "sector"}`}>{value}</span>;
    }

    function Countries({ list }) {
      if (!list || list.length === 0) return <span style={{color:"#aaa",fontSize:"12px"}}>—</span>;
      return (
        <div className="countries">
          {list.map(c => <span key={c} className="country">{c}</span>)}
        </div>
      );
    }

    function App() {
      const [incidents, setIncidents] = React.useState([]);
      const [stats, setStats] = React.useState(null);
      const [loading, setLoading] = React.useState(true);
      const [error, setError] = React.useState(null);
      const [filters, setFilters] = React.useState({ severity: "", sector: "", country: "", source: "" });

      const fetchData = async () => {
        setLoading(true);
        setError(null);
        try {
          const params = new URLSearchParams();
          if (filters.severity) params.append("severity", filters.severity);
          if (filters.sector)   params.append("sector",   filters.sector);
          if (filters.country)  params.append("country",  filters.country.toUpperCase());
          if (filters.source)   params.append("source",   filters.source);
          params.append("limit", "100");

          const [incRes, statsRes] = await Promise.all([
            fetch(`${API}/incidents?${params}`),
            fetch(`${API}/stats`)
          ]);
          const incData   = await incRes.json();
          const statsData = await statsRes.json();
          setIncidents(incData.incidents || []);
          setStats(statsData);
        } catch (e) {
          setError("Cannot reach the EuroWatch API. Make sure the backend is running.");
        } finally {
          setLoading(false);
        }
      };

      React.useEffect(() => { fetchData(); }, []);

      const reset = () => {
        setFilters({ severity: "", sector: "", country: "", source: "" });
        setTimeout(fetchData, 0);
      };

      return (
        <>
          <header>
            <div>
              <h1>👁 EuroWatch</h1>
              <span>EU Critical Infrastructure Cyber Incident Monitor</span>
            </div>
          </header>

          <div className="container">
            {error && <div className="error">{error}</div>}

            {stats && (
              <div className="stats-grid">
                <div className="stat-card">
                  <div className="label">Total Incidents</div>
                  <div className="value">{stats.total_incidents}</div>
                </div>
                <div className="stat-card">
                  <div className="label">Critical</div>
                  <div className="value" style={{color:"#b71c1c"}}>{stats.by_severity?.critical || 0}</div>
                </div>
                <div className="stat-card">
                  <div className="label">High</div>
                  <div className="value" style={{color:"#e65100"}}>{stats.by_severity?.high || 0}</div>
                </div>
                <div className="stat-card">
                  <div className="label">Sources</div>
                  <div className="value">{Object.keys(stats.by_source || {}).length}</div>
                </div>
                <div className="stat-card">
                  <div className="label">Countries</div>
                  <div className="value">{Object.keys(stats.by_country || {}).length}</div>
                </div>
              </div>
            )}

            <div className="filters">
              <label>Severity</label>
              <select value={filters.severity} onChange={e => setFilters({...filters, severity: e.target.value})}>
                <option value="">All</option>
                <option value="critical">Critical</option>
                <option value="high">High</option>
                <option value="medium">Medium</option>
                <option value="low">Low</option>
              </select>

              <label>Sector</label>
              <select value={filters.sector} onChange={e => setFilters({...filters, sector: e.target.value})}>
                <option value="">All</option>
                <option value="telecom">Telecom</option>
                <option value="energy">Energy</option>
                <option value="water">Water</option>
                <option value="health">Health</option>
                <option value="finance">Finance</option>
                <option value="transport">Transport</option>
              </select>

              <label>Country</label>
              <input
                placeholder="e.g. DE"
                value={filters.country}
                onChange={e => setFilters({...filters, country: e.target.value})}
                style={{width: "70px"}}
              />

              <label>Source</label>
              <select value={filters.source} onChange={e => setFilters({...filters, source: e.target.value})}>
                <option value="">All</option>
                <option value="CERT_EU">CERT-EU</option>
                <option value="ENISA_CNW">ENISA CSIRTs Network</option>
              </select>

              <button onClick={fetchData}>Search</button>
              <button className="reset" onClick={reset}>Reset</button>
            </div>

            {loading ? (
              <div className="loading">Loading incidents...</div>
            ) : (
              <>
                <div className="total-bar">{incidents.length} incident{incidents.length !== 1 ? "s" : ""} found</div>
                <table>
                  <thead>
                    <tr>
                      <th>Date</th>
                      <th>Severity</th>
                      <th>Sector</th>
                      <th>Title</th>
                      <th>Countries</th>
                      <th>CVEs</th>
                      <th>Source</th>
                    </tr>
                  </thead>
                  <tbody>
                    {incidents.map(i => (
                      <tr key={i.id}>
                        <td style={{whiteSpace:"nowrap",color:"#555"}}>{i.date_published.slice(0,10)}</td>
                        <td><Badge value={i.severity} type="severity" /></td>
                        <td><Badge value={i.sector} type="sector" /></td>
                        <td>
                          <a className="title-link" href={i.source_url} target="_blank" rel="noopener noreferrer">
                            {i.title}
                          </a>
                        </td>
                        <td><Countries list={i.countries} /></td>
                        <td style={{fontSize:"11px",color:"#555",maxWidth:"120px"}}>{i.cve_ids || "—"}</td>
                        <td style={{fontSize:"11px",color:"#888"}}>{i.source}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </>
            )}
          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
