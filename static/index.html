<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EuroWatch — EU Cyber Incident Monitor</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <style>
    :root {
      --navy: #0a1628;
      --navy-2: #0f2040;
      --navy-3: #1a3058;
      --amber: #f0a500;
      --amber-dim: #c4850a;
      --red: #e05252;
      --green: #4caf82;
      --text: #e8edf5;
      --text-dim: #8a9bb5;
      --border: #1e3554;
      --font-display: 'Playfair Display', Georgia, serif;
      --font-mono: 'IBM Plex Mono', monospace;
      --font-sans: 'IBM Plex Sans', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--navy); color: var(--text); font-family: var(--font-sans); min-height: 100vh; }

    /* Header */
    header {
      background: var(--navy-2);
      border-bottom: 1px solid var(--border);
      padding: 0 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo { display: flex; align-items: baseline; gap: 12px; }
    .logo h1 { font-family: var(--font-display); font-size: 22px; color: var(--text); letter-spacing: -0.5px; }
    .logo span { font-family: var(--font-mono); font-size: 11px; color: var(--amber); letter-spacing: 2px; text-transform: uppercase; }
    .header-right { display: flex; align-items: center; gap: 24px; }
    .live-indicator { display: flex; align-items: center; gap: 6px; font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); }
    .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* Layout */
    .container { max-width: 1300px; margin: 0 auto; padding: 32px 24px; }

    /* Section headers */
    .section-label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--amber);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* Stat cards */
    .stats-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 32px; }
    .stat-card {
      background: var(--navy-2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 20px;
      transition: border-color 0.2s;
    }
    .stat-card:hover { border-color: var(--navy-3); }
    .stat-card .stat-label { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
    .stat-card .stat-value { font-family: var(--font-display); font-size: 40px; line-height: 1; color: var(--text); }
    .stat-card .stat-value.critical { color: var(--red); }
    .stat-card .stat-value.high { color: var(--amber); }
    .stat-card .stat-value.green { color: var(--green); }

    /* Main grid */
    .main-grid { display: grid; grid-template-columns: 1fr 340px; gap: 24px; margin-bottom: 32px; }

    /* Map */
    .map-card {
      background: var(--navy-2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 20px;
    }
    .europe-map { width: 100%; height: 480px; position: relative; padding-bottom: 8px; }
    .europe-map svg { width: 100%; height: 100%; }
    .country-path { cursor: pointer; transition: opacity 0.15s; stroke: var(--navy); stroke-width: 0.5; }
    .country-path:hover { opacity: 0.8; stroke: var(--amber); stroke-width: 1; }
    .map-tooltip {
      position: absolute;
      background: var(--navy-3);
      border: 1px solid var(--amber);
      padding: 8px 12px;
      border-radius: 4px;
      font-family: var(--font-mono);
      font-size: 12px;
      pointer-events: none;
      white-space: nowrap;
      z-index: 10;
    }
    .map-legend { display: flex; gap: 16px; margin-top: 16px; align-items: center; }
    .map-legend span { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-swatch { width: 12px; height: 12px; border-radius: 2px; border: 1px solid #2a4060; }

    /* Right sidebar */
    .sidebar { display: flex; flex-direction: column; gap: 16px; }
    .chart-card {
      background: var(--navy-2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 20px;
    }
    .chart-card h3 { font-family: var(--font-mono); font-size: 10px; color: var(--amber); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 16px; }

    /* Sector breakdown */
    .sector-bar { margin-bottom: 10px; }
    .sector-bar-label { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 12px; }
    .sector-bar-label span:first-child { color: var(--text); text-transform: capitalize; }
    .sector-bar-label span:last-child { font-family: var(--font-mono); color: var(--text-dim); }
    .sector-bar-track { height: 4px; background: var(--border); border-radius: 2px; }
    .sector-bar-fill { height: 4px; background: var(--amber); border-radius: 2px; transition: width 0.6s ease; }

    /* Filters */
    .filters-bar {
      background: var(--navy-2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 16px 20px;
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .filter-group { display: flex; align-items: center; gap: 8px; }
    .filter-group label { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; }
    .filter-group select, .filter-group input {
      background: var(--navy);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 12px;
      padding: 5px 10px;
    }
    .filter-group select:focus, .filter-group input:focus { outline: none; border-color: var(--amber); }
    .btn { background: var(--amber); color: var(--navy); border: none; border-radius: 3px; padding: 6px 16px; font-family: var(--font-mono); font-size: 11px; font-weight: 600; cursor: pointer; letter-spacing: 1px; text-transform: uppercase; }
    .btn:hover { background: var(--amber-dim); }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-dim); }
    .btn-ghost:hover { border-color: var(--text-dim); color: var(--text); background: transparent; }
    .result-count { font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); margin-left: auto; }

    /* Incidents table */
    .incidents-card {
      background: var(--navy-2);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    thead { background: var(--navy); }
    th { padding: 10px 16px; text-align: left; font-family: var(--font-mono); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); border-bottom: 1px solid var(--border); }
    td { padding: 12px 16px; font-size: 13px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    /* Badges */
    .badge { display: inline-block; padding: 2px 8px; border-radius: 2px; font-family: var(--font-mono); font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
    .badge-critical { background: rgba(224,82,82,0.15); color: var(--red); border: 1px solid rgba(224,82,82,0.3); }
    .badge-high { background: rgba(240,165,0,0.15); color: var(--amber); border: 1px solid rgba(240,165,0,0.3); }
    .badge-medium { background: rgba(76,175,130,0.15); color: var(--green); border: 1px solid rgba(76,175,130,0.3); }
    .badge-low { background: rgba(138,155,181,0.1); color: var(--text-dim); border: 1px solid var(--border); }
    .badge-unknown { background: rgba(138,155,181,0.1); color: var(--text-dim); border: 1px solid var(--border); }
    .badge-sector { background: rgba(240,165,0,0.08); color: #a0b8d8; border: 1px solid rgba(160,184,216,0.2); }

    .title-link { color: var(--text); text-decoration: none; font-weight: 400; line-height: 1.4; }
    .title-link:hover { color: var(--amber); }

    .countries-list { display: flex; flex-wrap: wrap; gap: 3px; }
    .country-tag { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); background: var(--navy); border: 1px solid var(--border); padding: 1px 5px; border-radius: 2px; }

    .date-cell { font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); white-space: nowrap; }
    .loading { text-align: center; padding: 80px; color: var(--text-dim); font-family: var(--font-mono); font-size: 12px; letter-spacing: 2px; }
    .error-msg { background: rgba(224,82,82,0.1); border: 1px solid rgba(224,82,82,0.3); color: var(--red); padding: 16px; border-radius: 4px; margin-bottom: 16px; font-family: var(--font-mono); font-size: 12px; }

    @media (max-width: 900px) {
      .main-grid { grid-template-columns: 1fr; }
      .stats-row { grid-template-columns: repeat(3, 1fr); }
      header { padding: 0 16px; }
      .container { padding: 16px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">

const API = "http://127.0.0.1:8000";

// Europe SVG map — simplified paths for EU member states
// Colors based on advisory count
const COUNTRY_COLORS = (count, max) => {
  if (!count) return "#1a3058";
  const intensity = count / max;
  if (intensity > 0.7) return "#f0a500";
  if (intensity > 0.4) return "#c4850a";
  if (intensity > 0.2) return "#8a6020";
  return "#4a4010";
};

const COUNTRY_NAMES = {
  AT:"Austria",BE:"Belgium",BG:"Bulgaria",CY:"Cyprus",CZ:"Czech Republic",
  DE:"Germany",DK:"Denmark",EE:"Estonia",ES:"Spain",FI:"Finland",
  FR:"France",GR:"Greece",HR:"Croatia",HU:"Hungary",IE:"Ireland",
  IT:"Italy",LT:"Lithuania",LU:"Luxembourg",LV:"Latvia",MT:"Malta",
  NL:"Netherlands",PL:"Poland",PT:"Portugal",RO:"Romania",SE:"Sweden",
  SI:"Slovenia",SK:"Slovakia"
};

// Simplified EU country SVG paths (approximate positions as circles for reliability)
const EU_POSITIONS = {
  DE:{cx:370,cy:195},FR:{cx:300,cy:255},IT:{cx:390,cy:320},ES:{cx:220,cy:320},
  PL:{cx:460,cy:175},RO:{cx:510,cy:250},NL:{cx:330,cy:165},BE:{cx:320,cy:190},
  SE:{cx:420,cy:100},CZ:{cx:430,cy:195},GR:{cx:480,cy:350},PT:{cx:185,cy:315},
  HU:{cx:480,cy:225},AT:{cx:420,cy:220},BY:{cx:530,cy:155},FI:{cx:490,cy:80},
  SK:{cx:465,cy:210},DK:{cx:375,cy:145},NO:{cx:360,cy:80},IE:{cx:250,cy:175},
  HR:{cx:435,cy:260},LT:{cx:500,cy:155},LV:{cx:505,cy:135},EE:{cx:515,cy:115},
  SI:{cx:420,cy:245},BG:{cx:510,cy:280},LU:{cx:335,cy:205},CY:{cx:555,cy:370},
  MT:{cx:415,cy:390},
};

function EuropeMap({ countryData, onCountryClick }) {
  const svgRef = React.useRef(null);
  const [tooltip, setTooltip] = React.useState(null);
  const [geoData, setGeoData] = React.useState(null);

  // Fetch GeoJSON once
  React.useEffect(() => {
    fetch("https://raw.githubusercontent.com/leakyMirror/map-of-europe/master/GeoJSON/europe.geojson")
      .then(r => r.json())
      .then(data => setGeoData(data))
      .catch(() => {
        // Fallback to another source
        fetch("https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson")
          .then(r => r.json())
          .then(data => setGeoData(data));
      });
  }, []);

  React.useEffect(() => {
    if (!geoData || !svgRef.current) return;

    const EU_CODES = new Set(Object.keys(COUNTRY_NAMES));
    const maxCount = Math.max(...Object.values(countryData), 1);

    const width = svgRef.current.clientWidth || 600;
    const height = 420;

    // Clear previous render
    d3.select(svgRef.current).selectAll("*").remove();

    const svg = d3.select(svgRef.current)
      .attr("width", width)
      .attr("height", height);

    // Projection centered on Europe
    const projection = d3.geoMercator()
  .center([23, 52])
  .scale(width * 0.52)
  .translate([width / 2, height / 2]);

    const path = d3.geoPath().projection(projection);

    // Color scale
    const colorScale = (count) => {
      if (!count) return "#0f2040";
      const t = count / maxCount;
      if (t > 0.7) return "#f0a500";
      if (t > 0.4) return "#c4850a";
      if (t > 0.15) return "#7a5510";
      return "#3a3010";
    };

    // Draw countries
    svg.selectAll("path")
      .data(geoData.features)
      .enter()
      .append("path")
      .attr("d", path)
      .attr("fill", d => {
        const code = d.properties.ISO2 || d.properties.ISO_A2 || d.properties.iso_a2 || d.properties.id || "";
        const count = countryData[code.toUpperCase()] || 0;
        return EU_CODES.has(code.toUpperCase()) ? colorScale(count) : "#0d1e35";
      })
      .attr("stroke", d => {
        const code = (d.properties.ISO2 || d.properties.ISO_A2 || d.properties.iso_a2 || d.properties.id || "").toUpperCase();
        return EU_CODES.has(code) ? "#0a1628" : "#0a1628";
      })
      .attr("stroke-width", 0.5)
      .style("cursor", d => {
        const code = (d.properties.ISO2 || d.properties.ISO_A2 || d.properties.iso_a2 || d.properties.id || "").toUpperCase();
        return EU_CODES.has(code) ? "pointer" : "default";
      })
      .style("transition", "fill 0.2s, opacity 0.2s")
      .on("mouseover", function(event, d) {
        const code = (d.properties.ISO2 || d.properties.ISO_A2 || d.properties.iso_a2 || d.properties.id || "").toUpperCase();
        if (!EU_CODES.has(code)) return;
        d3.select(this).attr("stroke", "#f0a500").attr("stroke-width", 1.5);
        const count = countryData[code] || 0;
        const rect = svgRef.current.getBoundingClientRect();
        setTooltip({
          code,
          name: COUNTRY_NAMES[code] || code,
          count,
          x: event.clientX - rect.left,
          y: event.clientY - rect.top
        });
      })
      .on("mousemove", function(event) {
        const rect = svgRef.current.getBoundingClientRect();
        setTooltip(t => t ? {...t, x: event.clientX - rect.left, y: event.clientY - rect.top} : t);
      })
      .on("mouseout", function(event, d) {
        d3.select(this).attr("stroke", "#0a1628").attr("stroke-width", 0.5);
        setTooltip(null);
      })
      .on("click", function(event, d) {
        const code = (d.properties.ISO2 || d.properties.ISO_A2 || d.properties.iso_a2 || d.properties.id || "").toUpperCase();
        if (EU_CODES.has(code)) onCountryClick(code);
      });

  }, [geoData, countryData]);

  return (
    <div className="europe-map" style={{position:"relative"}}>
      {!geoData && (
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"420px",fontFamily:"var(--font-mono)",fontSize:"11px",color:"var(--text-dim)",letterSpacing:"2px"}}>
          LOADING MAP DATA...
        </div>
      )}
      <svg ref={svgRef} style={{width:"100%", height:"440px", display: geoData ? "block" : "none"}}></svg>
      {tooltip && (
        <div className="map-tooltip" style={{
          left: Math.min(tooltip.x + 12, 500),
          top: Math.max(tooltip.y - 40, 0),
          position: "absolute"
        }}>
          <div style={{color:"var(--amber)",fontWeight:"600",marginBottom:"2px"}}>{tooltip.name}</div>
          <div style={{color:"var(--text-dim)"}}>{tooltip.count} advisory response{tooltip.count !== 1 ? "s" : ""}</div>
        </div>
      )}
      <div className="map-legend">
        <span>Activity level:</span>
        {[["#3a3010","Low"],["#7a5510","Medium"],["#c4850a","High"],["#f0a500","Most active"],["#1e3554","No data"]].map(([color, label]) => (
          <div key={label} className="legend-item">
            <div className="legend-swatch" style={{background:color}}></div>
            <span>{label}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function SectorBreakdown({ bySector, total }) {
  const sectors = Object.entries(bySector).sort((a,b) => b[1]-a[1]);
  return (
    <div>
      {sectors.map(([sector, count]) => (
        <div key={sector} className="sector-bar">
          <div className="sector-bar-label">
            <span>{sector.replace('-', ' ')}</span>
            <span>{count}</span>
          </div>
          <div className="sector-bar-track">
            <div className="sector-bar-fill" style={{width: `${(count/total)*100}%`}}></div>
          </div>
        </div>
      ))}
    </div>
  );
}

function YearChart({ incidents }) {
  const canvasRef = React.useRef(null);
  const chartRef = React.useRef(null);

  React.useEffect(() => {
    if (!incidents.length || !canvasRef.current) return;
    const yearCounts = {};
    incidents.forEach(i => {
      const y = i.date_published.slice(0,4);
      yearCounts[y] = (yearCounts[y]||0) + 1;
    });
    const years = Object.keys(yearCounts).sort();

    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(canvasRef.current, {
      type: "bar",
      data: {
        labels: years,
        datasets: [{
          data: years.map(y => yearCounts[y]),
          backgroundColor: "rgba(240,165,0,0.7)",
          borderColor: "#f0a500",
          borderWidth: 1,
          borderRadius: 2,
        }]
      },
      options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
          y: { beginAtZero: true, ticks: { color: "#8a9bb5", font: { family: "IBM Plex Mono", size: 10 } }, grid: { color: "#1e3554" } },
          x: { ticks: { color: "#8a9bb5", font: { family: "IBM Plex Mono", size: 10 } }, grid: { display: false } }
        }
      }
    });
  }, [incidents]);

  return <canvas ref={canvasRef} height="140"></canvas>;
}

function Badge({ value, type }) {
  if (!value) return <span className="badge badge-unknown">—</span>;
  if (type === "sector") return <span className="badge badge-sector">{value.replace('-',' ')}</span>;
  return <span className={`badge badge-${value}`}>{value}</span>;
}

function App() {
  const [incidents, setIncidents] = React.useState([]);
  const [stats, setStats] = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  const [error, setError] = React.useState(null);
  const [filters, setFilters] = React.useState({ severity:"", sector:"", country:"", source:"" });
  const [nextRun, setNextRun] = React.useState("");

  const fetchData = async (f = filters) => {
    setLoading(true); setError(null);
    try {
      const params = new URLSearchParams();
      if (f.severity) params.append("severity", f.severity);
      if (f.sector)   params.append("sector",   f.sector);
      if (f.country)  params.append("country",  f.country.toUpperCase());
      if (f.source)   params.append("source",   f.source);
      params.append("limit", "200");

      const [incRes, statsRes, rootRes] = await Promise.all([
        fetch(`${API}/incidents?${params}`),
        fetch(`${API}/stats`),
        fetch(`${API}/`)
      ]);
      const incData   = await incRes.json();
      const statsData = await statsRes.json();
      const rootData  = await rootRes.json();
      setIncidents(incData.incidents || []);
      setStats(statsData);
      if (rootData.next_ingestion) {
        setNextRun(rootData.next_ingestion.slice(0,16));
      }
    } catch(e) {
      setError("Cannot reach the EuroWatch API. Make sure uvicorn is running on port 8000.");
    } finally { setLoading(false); }
  };

  React.useEffect(() => { fetchData(); }, []);

  const reset = () => {
    const f = { severity:"", sector:"", country:"", source:"" };
    setFilters(f);
    fetchData(f);
  };

  const handleCountryClick = (code) => {
    const f = {...filters, country: code};
    setFilters(f);
    fetchData(f);
  };

  const sectorData = stats ? Object.fromEntries(
    Object.entries(stats.by_sector).map(([k,v]) => [k === 'unclassified' ? 'unclassified' : k, v])
  ) : {};

  return (
    <>
      <header>
        <div className="logo">
          <h1>EuroWatch</h1>
          <span>EU Cyber Intelligence</span>
        </div>
        <div className="header-right">
          <div className="live-indicator">
            <div className="live-dot"></div>
            <span>LIVE — Next update {nextRun || "—"}</span>
          </div>
        </div>
      </header>

      <div className="container">
        {error && <div className="error-msg">{error}</div>}

        {/* Stats row */}
        {stats && (
          <div className="stats-row">
            <div className="stat-card">
              <div className="stat-label">Total Incidents</div>
              <div className="stat-value">{stats.total_incidents}</div>
            </div>
            <div className="stat-card">
              <div className="stat-label">Critical</div>
              <div className="stat-value critical">{stats.by_severity?.critical || 0}</div>
            </div>
            <div className="stat-card">
              <div className="stat-label">High Severity</div>
              <div className="stat-value high">{stats.by_severity?.high || 0}</div>
            </div>
            <div className="stat-card">
              <div className="stat-label">EU Sources</div>
              <div className="stat-value green">{Object.keys(stats.by_source || {}).length}</div>
            </div>
            <div className="stat-card">
              <div className="stat-label">Countries Active</div>
              <div className="stat-value green">{Object.keys(stats.by_country || {}).length}</div>
            </div>
          </div>
        )}

        {/* Map + sidebar */}
        <div className="main-grid">
          <div className="map-card">
            <div className="section-label">EU Member State Advisory Activity</div>
            {stats && (
              <EuropeMap
                countryData={stats.by_country || {}}
                onCountryClick={handleCountryClick}
              />
            )}
            {filters.country && (
              <div style={{marginTop:"12px",fontFamily:"var(--font-mono)",fontSize:"11px",color:"var(--amber)"}}>
                Filtered by: {COUNTRY_NAMES[filters.country] || filters.country} — <span style={{cursor:"pointer",textDecoration:"underline"}} onClick={reset}>clear</span>
              </div>
            )}
          </div>

          <div className="sidebar">
            <div className="chart-card">
              <h3>Incidents by Year</h3>
              <YearChart incidents={incidents} />
            </div>
            <div className="chart-card">
              <h3>By Sector</h3>
              {stats && <SectorBreakdown bySector={sectorData} total={stats.total_incidents} />}
            </div>
          </div>
        </div>

        {/* Filters */}
        <div className="filters-bar">
          <div className="filter-group">
            <label>Severity</label>
            <select value={filters.severity} onChange={e => setFilters({...filters, severity: e.target.value})}>
              <option value="">All</option>
              <option value="critical">Critical</option>
              <option value="high">High</option>
              <option value="medium">Medium</option>
              <option value="low">Low</option>
            </select>
          </div>
          <div className="filter-group">
            <label>Sector</label>
            <select value={filters.sector} onChange={e => setFilters({...filters, sector: e.target.value})}>
              <option value="">All</option>
              <option value="telecom">Telecom</option>
              <option value="general-it">General IT</option>
              <option value="energy">Energy</option>
              <option value="health">Health</option>
              <option value="finance">Finance</option>
              <option value="transport">Transport</option>
              <option value="government">Government</option>
            </select>
          </div>
          <div className="filter-group">
            <label>Country</label>
            <input placeholder="e.g. DE" value={filters.country}
              onChange={e => setFilters({...filters, country: e.target.value})}
              style={{width:"70px"}} />
          </div>
          <div className="filter-group">
            <label>Source</label>
            <select value={filters.source} onChange={e => setFilters({...filters, source: e.target.value})}>
              <option value="">All</option>
              <option value="CERT_EU">CERT-EU</option>
              <option value="ENISA_CNW">ENISA CSIRTs Network</option>
            </select>
          </div>
          <button className="btn" onClick={() => fetchData()}>Search</button>
          <button className="btn btn-ghost" onClick={reset}>Reset</button>
          <span className="result-count">{incidents.length} incidents</span>
        </div>

        {/* Incidents table */}
        <div className="section-label">Incident Feed</div>
        {loading ? (
          <div className="loading">LOADING INTELLIGENCE DATA...</div>
        ) : (
          <div className="incidents-card">
            <table>
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Severity</th>
                  <th>Sector</th>
                  <th>Incident</th>
                  <th>Countries</th>
                  <th>CVEs</th>
                </tr>
              </thead>
              <tbody>
                {incidents.map(i => (
                  <tr key={i.id}>
                    <td className="date-cell">{i.date_published.slice(0,10)}</td>
                    <td><Badge value={i.severity} type="severity" /></td>
                    <td><Badge value={i.sector} type="sector" /></td>
                    <td>
                      <a className="title-link" href={i.source_url} target="_blank" rel="noopener noreferrer">
                        {i.title.replace(/^\d{4}-\d+:\s*/, '')}
                      </a>
                    </td>
                    <td>
                      {i.countries && i.countries.length > 0 ? (
                        <div className="countries-list">
                          {i.countries.map(c => <span key={c} className="country-tag">{c}</span>)}
                        </div>
                      ) : <span style={{color:"var(--text-dim)",fontSize:"11px"}}>EU-wide</span>}
                    </td>
                    <td style={{fontFamily:"var(--font-mono)",fontSize:"10px",color:"var(--text-dim)",maxWidth:"140px"}}>
                      {i.cve_ids || "—"}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
